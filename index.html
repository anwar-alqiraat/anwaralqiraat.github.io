<!DOCTYPE html>
<html lang="ar" dir="rtl"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>يَسَّرنَاهُ بِلِسانِك</title>
  <link rel="preconnect" href="https://fonts.googleapis.com/">
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════
       COLOR PALETTE — White · Green
    ══════════════════════════════════════ */
    :root {
      --bg:         #f8faf8;
      --surface:    #ffffff;
      --card:       #ffffff;
      --card-hover: #f0fdf4;
      --border:     #e5e7eb;
      --border-lit: #86efac;
      --green-light:#22c55e;
      --green-dim:  rgba(34, 197, 94, 0.12);
      --green-glow: rgba(34, 197, 94, 0.25);
      --green-dark: #15803d;
      --text-main:  #111827;
      --text-muted: #4b5563;
      --white:      #ffffff;
      --yellow:     #ecdc28;
      --dark-yellow : #cfa718;
      --tag-bg:     rgba(34, 197, 94, 0.1);
      --tag-text:   #15803d;
      --radius:     14px;
      --transition: .35s cubic-bezier(.4,0,.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text-main);
      font-family: 'Cairo', 'Tajawal', sans-serif;
      font-weight: 400;
      line-height: 1.8;
      min-height: 100vh;
      overflow-x: hidden;
      direction: rtl;
      text-align: right;
    }
    ::selection { background: var(--green-glow); color: var(--green-dark); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--green-light); border-radius: 3px; }

    /* شبكة الخلفية */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(34, 197, 94, .05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34, 197, 94, .05) 1px, transparent 1px);
      background-size: 55px 55px;
      pointer-events: none;
      z-index: 0;
    }

    /* بقع الإضاءة */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
      animation: drift 20s ease-in-out infinite alternate;
    }
    .blob-1 { width:600px;height:600px;background:radial-gradient(circle,#dcfce7 0%,transparent 70%);top:-200px;right:-150px;opacity:.8;animation-delay:0s; }
    .blob-2 { width:500px;height:500px;background:radial-gradient(circle,#bbf7d0 0%,transparent 70%);bottom:-150px;left:-100px;opacity:.7;animation-delay:-10s; }
    .blob-3 { width:300px;height:300px;background:radial-gradient(circle,rgba(34,197,94,.15) 0%,transparent 70%);top:42%;left:48%;opacity:1;animation-delay:-5s; }
    @keyframes drift {
      from { transform:translate(0,0) scale(1); }
      to   { transform:translate(30px,40px) scale(1.1); }
    }

    .container { max-width:1160px;margin:0 auto;padding:0 28px;position:relative;z-index:1; }

    /* ══ HEADER ══ */
    header {
      padding: 22px 0;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 100;
    }
    .header-inner { 
      display:flex;
      align-items:center;
      justify-content:flex-start;
      position: relative;
      min-height: 48px;
    }
    .brand { 
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 0;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 8px;
      text-decoration:none; 
      z-index: 101;
    }
    .brand-pfp {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--surface);
      box-shadow: 0 0 0 2px var(--green-light), 0 8px 16px rgba(0,0,0,0.1);
      transition: transform var(--transition), box-shadow var(--transition);
      background: var(--surface);
    }
    .brand-pfp-placeholder {
      width: 90px; height: 90px; border-radius: 50%;
      background: linear-gradient(135deg, var(--green-light), var(--green-dark));
      border: 4px solid var(--surface);
      box-shadow: 0 0 0 2px var(--green-light), 0 8px 16px rgba(0,0,0,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; color: var(--white); font-weight: 700;
      transition: transform var(--transition);
    }
    .brand:hover .brand-pfp,
    .brand:hover .brand-pfp-placeholder {
      transform: scale(1.05);
      box-shadow: 0 0 0 4px var(--green-dim), 0 12px 24px rgba(34,197,94,0.2);
    }
    .brand-info { display:flex;flex-direction:column;gap:2px; text-align: center; }
    .brand-name { font-size:1.15rem;font-weight:700;color:var(--text-main); }
    .brand-subtitle { font-size:.7rem;color:var(--green-dark);letter-spacing:.12em;text-transform:uppercase;font-weight:700; }
    
    nav { display:flex;gap:4px; }
    nav a {
      color:var(--text-muted);text-decoration:none;
      font-size:.9rem;font-weight:600;
      padding:8px 16px;border-radius:8px;
      border:1px solid transparent;
      transition:all var(--transition);
    }
    nav a:hover { color:var(--green-dark);background:var(--green-dim);border-color:rgba(34,197,94,.2); }

    /* ══ BANNER ══ */
    .banner-wrapper {
      width: 100%;
      height: 720px;
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      border-radius: var(--radius);
      margin-top: 50px;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .banner-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
    }
    .banner-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: var(--green-dark);
      font-family: 'Cairo', sans-serif;
      font-weight: 600;
      opacity: 0.7;
      z-index: 1;
    }

    /* ══ HERO ══ */
    .hero { padding: 50px 0 60px; text-align: center; position: relative; }
    .hero::after {
      content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
      width:200px;height:2px;
      background:linear-gradient(90deg,transparent,var(--green-light),transparent);
    }
    .hero h1 {
      font-size:clamp(2.2rem,5.5vw,3.8rem);font-weight:900;
      line-height:1.4;color:var(--text-main);
      opacity:0;animation:fadeUp .7s .2s forwards;
    }
    .hero h1 .highlight {
      font-family: 'Amiri', serif;
      background:linear-gradient(90deg,var(--green-dark),var(--green-light));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      font-weight: 700;
      font-size: 1.1em;
    }
    .hero h1 .highlight1 {
      font-family: 'Amiri', serif;
      background:linear-gradient(90deg,var(--dark-yellow),var(--yellow));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      font-weight: 700;
      font-size: 1.1em;
    }
    .hero-desc {
      max-width:580px;margin:22px auto 0;
      font-size:1.05rem;color:var(--text-muted);
      line-height:1.9;font-weight:400;
      opacity:0;animation:fadeUp .7s .35s forwards;
    }
    @keyframes fadeUp {
      from{opacity:0;transform:translateY(24px)}
      to{opacity:1;transform:translateY(0)}
    }

  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <header>
    <div class="container">
      <div class="header-inner">
        <nav>
          <a href="#">الرئيسية</a>
        </nav>

        <a class="brand" href="#">
            <img src="photo.jpeg" alt="د. محمد مسلم" class="brand-pfp" />
          <div class="brand-info">
            <span class="brand-name"></span>
            <span class="brand-subtitle"></span>
          </div>
        </a>

      </div>
    </div>
  </header>

  <section class="banner">
    <div class="container">
      <div class="banner-wrapper">
        <img src="banner.jpeg" alt="Banner Image" class="banner-img" />
        <div class="banner-placeholder">
        </div>
      </div>
    </div>
  </section>

  <section class="hero" id="lectures">
    <div class="container">
      <h1><span class="highlight1">أَنوارُ القِراءَات</span><br><span class="highlight">يَسَّرنَاهُ بِلِسانِك</span></h1>
      <p class="hero-desc">برنامج يتمحور حول شرح المفردات التي اختلف تواترها في القراءات العشر</p>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>
        © <span id="yr">2026</span>
        <span class="footer-dot"></span>
        <span class="footer-name">د. محمد إبراهيم مسلم</span>
        <span class="footer-dot"></span>
        جميع الحقوق محفوظة
      </p>
    </div>
  </footer>
</body>
</html>
